services:

  postgres:
    image: postgres:15
    container_name: retailmax_postgres
    environment:
      POSTGRES_DB: retailmax
      POSTGRES_USER: retailmax_user
      POSTGRES_PASSWORD: retailmax_pass
    volumes:
      - ./init-scripts:/docker-entrypoint-initdb.d
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U retailmax_user -d retailmax"]
      interval: 10s
      timeout: 5s
      retries: 5

  metabase:
    image: metabase/metabase:v0.49.0
    container_name: retailmax_metabase
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      JAVA_TIMEZONE: America/Guatemala
      MB_DB_FILE: /metabase-data/metabase.db
    volumes:
      - ./metabase-data:/metabase-data
    ports:
      - "3000:3000"

volumes:
  postgres_data: